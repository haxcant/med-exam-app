<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Firebase 連線檢查</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { background:#f8fafc; }
    .debug-wrap { max-width: 900px; margin: 0 auto; padding: 20px; }
    pre { white-space: pre-wrap; background:#0f172a; color:#e2e8f0; border-radius:12px; padding:12px; overflow:auto; }
    code { background:#f1f5f9; padding:1px 4px; border-radius:4px; }
  </style>
</head>
<body>
  <div class="debug-wrap">
    <header class="admin-title">
      <div>
        <h1>Firebase 連線檢查</h1>
        <p class="scope-summary subtle">本頁使用 modular Firebase SDK，不使用全域 <code>firebase</code> 物件。用來確認目前網頁實際連到哪個 Firebase project，以及登入後的 UID。</p>
      </div>
      <div class="actions compact">
        <a class="ghost-btn" href="./index.html">回主程式</a>
        <a class="ghost-btn" href="./admin.html">前往審核頁</a>
      </div>
    </header>

    <section class="panel">
      <h2>操作</h2>
      <div class="actions compact">
        <button id="btnLogin" type="button" class="primary-btn">Google 登入</button>
        <button id="btnLogout" type="button" class="ghost-btn">登出</button>
        <button id="btnRefresh" type="button" class="ghost-btn">重新整理狀態</button>
      </div>
    </section>

    <section class="panel">
      <h2>檢查結果</h2>
      <pre id="output">載入中...</pre>
      <p class="scope-summary subtle">若要成為管理者，請在 Firestore 建立 <code>admins/{你的UID}</code> 文件，並設 <code>enabled: true</code>。</p>
    </section>
  </div>

  <script type="module">
    import { app, auth } from "./firebase-init.js";
    import { loginWithGoogle, logoutFirebase, watchAuthState } from "./firebase-auth.js";
    import { getGlobalSyncConfig } from "./firebase-access.js";

    const out = document.getElementById("output");
    function safeJson(value) {
      return JSON.stringify(value, null, 2);
    }
    async function render(user = auth.currentUser) {
      let config = null;
      let configError = "";
      try {
        if (user) config = await getGlobalSyncConfig();
      } catch (err) {
        configError = err?.message || String(err);
      }
      out.textContent = safeJson({
        projectId: app.options.projectId,
        authDomain: app.options.authDomain,
        storageBucket: app.options.storageBucket,
        signedIn: !!user,
        uid: user?.uid || "",
        email: user?.email || "",
        displayName: user?.displayName || "",
        appConfig: config,
        appConfigError: configError
      });
    }

    document.getElementById("btnLogin")?.addEventListener("click", async () => {
      out.textContent = "登入中...";
      try { await loginWithGoogle(); }
      catch (err) { out.textContent = "登入失敗：\n" + (err?.message || String(err)); }
    });
    document.getElementById("btnLogout")?.addEventListener("click", () => logoutFirebase());
    document.getElementById("btnRefresh")?.addEventListener("click", () => render());
    watchAuthState((user) => render(user));
    render();
  </script>
</body>
</html>
